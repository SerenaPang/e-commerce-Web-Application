spring:
  devtools:
    livereload:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: abcd1234.

  sql:
    init:
      mode: always

  flyway:
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:test-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:test-client-secret}
            scope:
              - email
              - public_profile
        provider:
          facebook:
            user-name-attribute: email