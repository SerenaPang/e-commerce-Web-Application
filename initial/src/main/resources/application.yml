spring:
  profiles:
    include:
      - secrets

  devtools:
    livereload:
      enabled: false

  datasource:
    url: ${db.url:jdbc:postgresql://localhost:5432/postgres}
    username: ${db.username:postgres}
    password: ${db.password:abcd1234.}

  sql:
    init:
      mode: always

  flyway:
    baseline-on-migrate: true

  mustache:
    servlet:
      expose-request-attributes: true
      allow-session-override: true
      allow-request-override: true

  security:
    oauth2:
      client:
        registration:
          facebook:
            client-id: ${facebook.client-id:${FACEBOOK_CLIENT_ID:test-client-id}}
            client-secret: ${facebook.client-secret:${FACEBOOK_CLIENT_SECRET:test-client-secret}}
            scope:
              - email
              - public_profile
        provider:
          facebook:
            user-name-attribute: email